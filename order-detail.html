<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — Vista Manufacturing</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .item-card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 14px; overflow: hidden; }
    .item-card-header { background: #f8fafc; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .item-card-title-wrap { flex: 1 1 620px; min-width: 240px; display: flex; flex-direction: column; gap: 8px; }
    .item-card-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .item-card-title { font-size: 15px; color: #334155; }
    .item-identity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 6px; width: 100%; }
    .item-identity-pill { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 7px 9px; min-width: 0; }
    .item-identity-pill span { display: block; font-size: 9px; line-height: 1.2; color: #64748b; text-transform: uppercase; letter-spacing: 0.35px; margin-bottom: 2px; }
    .item-identity-pill strong { display: block; font-size: 12px; line-height: 1.35; color: #0f172a; font-weight: 700; overflow-wrap: anywhere; }
    .item-card-body { padding: 14px 16px; }
    .item-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .tag-fg { background: #ede9fe; color: #7c3aed; }
    .tag-rm { background: #dcfce7; color: #16a34a; }
    .dim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 10px; }
    .dim-cell { background: #f1f5f9; border-radius: 6px; padding: 8px 10px; }
    .dim-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .dim-value { font-size: 13px; font-weight: 600; }
    .bom-table th { font-size: 11px; background: #f8fafc; }
    .bom-table td { font-size: 12px; }
    .execute-btn { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .execute-btn:hover { background: #059669; }
    .execute-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .deducted-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #10b981; font-weight: 600; }
  </style>
</head>
<body>
  <!-- Order detail page: one order's status, items, production details, and print/PDF actions from js/order-detail.js. -->
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="loading-center" id="loading"><div class="spinner spinner-lg"></div></div>
    <div id="content" class="d-none" style="max-width:1040px; margin: 0 auto;">
      <a href="orders.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Orders</a>

      <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <div>
          <h1 id="order-title">Order</h1>
          <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
            <span id="order-badge"></span>
            <span id="order-uid-badge" class="text-muted" style="font-size:13px;"></span>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="openQuoteDownloads()" id="quote-downloads-btn">
            <i class="fa-solid fa-clock-rotate-left"></i> Downloads
          </button>
          <button class="btn btn-secondary" onclick="downloadOrderPDF()" id="download-btn">
            <i class="fa-solid fa-file-invoice-dollar"></i> Quote
          </button>
          <button class="btn btn-secondary" onclick="openEditOrder()" id="edit-order-btn" style="display:none;">
            <i class="fa-solid fa-pen-to-square"></i> Edit Order
          </button>
          <div id="admin-actions" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;"></div>
        </div>
      </div>

      <!-- Summary card -->
      <div class="card mb-4">
        <div class="info-grid" id="order-info"></div>
      </div>

      <!-- Alert -->
      <div id="detail-alert" class="d-none alert mb-3"></div>

      <!-- Full-page edit form -->
      <div id="edit-order-panel" class="d-none"></div>

      <!-- Items -->
      <div id="order-view-panel">
        <div class="fw-600 mb-3" id="items-heading" style="font-size:16px;">Items</div>
        <div id="items-list"></div>
      </div>

      <!-- Movement log (post-execute) -->
      <div id="movements-section" class="d-none mt-4">
        <div class="fw-600 mb-3" style="font-size:16px;">Inventory Movements</div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Roll Batch</th><th>Variant</th><th>Type</th><th>Quantity</th><th>Date</th>
              </tr></thead>
              <tbody id="movements-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Financial summary (post-execute) -->
      <div id="financial-summary" class="d-none mt-4"></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">Edit Order</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/inventory-source.js"></script>
<script src="js/transitions.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/order-detail.js"></script>
</body>
</html>
