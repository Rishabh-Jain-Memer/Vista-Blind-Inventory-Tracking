<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRP - Vista Manufacturing</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body.rrp-page .main { padding: 8px 10px !important; }
    body.rrp-page .page-header:not(.workspace-hero) {
      padding: 6px 10px !important;
      margin-bottom: 6px !important;
      border-radius: 10px !important;
    }
    body.rrp-page .card {
      padding: 5px !important;
      border-radius: 8px !important;
    }
    #rrp-rules-list table.rrp-sheet-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: #fff;
    }
    #rrp-rules-list .rrp-sheet-table th,
    #rrp-rules-list .rrp-sheet-table td {
      padding: 2px 4px !important;
      font-size: 11px !important;
      line-height: 1.05 !important;
      letter-spacing: 0 !important;
      vertical-align: middle;
    }
    #rrp-rules-list .rrp-sheet-table th {
      font-weight: 800;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    #rrp-rules-list .rrp-section-row td {
      padding: 3px 6px !important;
      font-size: 11px !important;
      line-height: 1 !important;
    }
    #rrp-rules-list .rrp-rate-btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      font-size: 11px;
      line-height: 1;
      padding: 0;
    }
    #rrp-rules-list .rrp-action-cell {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2px;
    }
    #rrp-rules-list .rrp-icon-action {
      width: 13px;
      height: 16px;
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
    }
    .rrp-top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .rrp-top-search {
      width: 280px;
      max-width: 30vw;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 12px;
      background: #fff;
    }
    #rrp-rules-list .rrp-icon-action:hover { color: #2563eb; }
    #rrp-rules-list .rrp-icon-action.danger { color: #dc2626; }
  </style>
</head>
<body class="rrp-page">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="loading-center" id="loading"><div class="spinner spinner-lg"></div></div>
    <div id="content" class="d-none">
      <div class="page-header" style="padding:6px 10px;margin-bottom:6px;min-height:auto;">
        <div>
          <h1 style="font-size:20px;line-height:1;margin:0;">RRP</h1>
        </div>
        <div class="rrp-top-actions">
          <input id="rrp-rule-search" class="rrp-top-search" placeholder="Search master or mechanism..." oninput="renderRRPRules()">
          <button class="btn btn-primary btn-sm" onclick="openRRPRuleModal()" title="Create RRP Table" style="padding:6px 9px;">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
      </div>

      <section id="rrp-rules-panel">
        <div id="rrp-rule-setup-error"></div>
        <div class="card" style="padding:5px;">
          <div id="rrp-rules-list"></div>
        </div>
      </section>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">x</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260629-testmode-1"></script>
<script src="js/auth.js?v=20260629-testmode-1"></script>
<script src="js/test-mode.js?v=20260629-testmode-1"></script>
<script src="js/utils.js"></script>
<script src="js/transitions.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/rrp.js"></script>
</body>
</html>
