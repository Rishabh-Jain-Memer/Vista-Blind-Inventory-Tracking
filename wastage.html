<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wastage Log — Vista Manufacturing</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Wastage page: logs production loss against inventory variants through js/wastage.js. -->
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="loading-center" id="loading"><div class="spinner spinner-lg"></div></div>
    <div id="content" class="d-none">

      <div class="page-header">
        <div>
          <h1>Wastage Log</h1>
          <p>Fabric offcuts and material waste per order</p>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="openAddWastageModal()">
            <i class="fa-solid fa-plus"></i> Add Entry
          </button>
          <button class="btn btn-ghost btn-sm" onclick="exportWastageExcel()">
            <i class="fa-solid fa-file-excel"></i> Export
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="wastage-stats"></div>

      <!-- Filters -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header" style="padding:12px 16px;gap:10px;flex-wrap:wrap;">
          <input type="text" id="search-input" placeholder="Search order, fabric, variant…" class="filter-input" style="flex:1;min-width:200px;" oninput="renderTable()">
          <input type="date" id="from-date" class="filter-select" oninput="renderTable()" title="From date">
          <input type="date" id="to-date"   class="filter-select" oninput="renderTable()" title="To date">
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Date</th>
              <th>Order</th>
              <th>Fabric / Variant</th>
              <th style="text-align:right;">Cut Length</th>
              <th style="text-align:right;">Used Length</th>
              <th style="text-align:right;">Waste Length</th>
              <th style="text-align:right;">Roll Width</th>
              <th style="text-align:right;">Blind Width</th>
              <th style="text-align:right;">Waste Area</th>
              <th></th>
            </tr></thead>
            <tbody id="wastage-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">Add Wastage Entry</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/inventory-source.js"></script>
<script src="js/transitions.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/wastage.js"></script>
</body>
</html>
