<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wastage - Vista Manufacturing</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="loading-center" id="loading"><div class="spinner spinner-lg"></div></div>
    <div id="content" class="d-none">
      <div class="page-header">
        <div>
          <h1>Wastage</h1>
          <p>Cut pieces generated from order execution and available for reuse</p>
        </div>
      </div>

      <div class="stats-grid" id="wastage-stats"></div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-header" style="padding:12px 16px;gap:10px;flex-wrap:wrap;justify-content:flex-start;">
          <input type="text" id="search-input" placeholder="Search order, fabric, dimensions..." class="filter-input" style="flex:1;min-width:220px;">
          <select id="status-filter" class="filter-select">
            <option value="">All Pieces</option>
            <option value="available">Available</option>
            <option value="depleted">Depleted</option>
            <option value="scrapped">Scrapped</option>
          </select>
          <input type="date" id="from-date" class="filter-select" title="From date">
          <input type="date" id="to-date" class="filter-select" title="To date">
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Date</th>
              <th>Fabric</th>
              <th>Piece Created</th>
              <th>Remaining</th>
              <th>Source Roll</th>
              <th>Source Order</th>
              <th>Status</th>
            </tr></thead>
            <tbody id="wastage-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/test-mode.js"></script>
<script src="js/utils.js"></script>
<script src="js/transitions.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/wastage.js"></script>
</body>
</html>
