<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Development Environment</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #fff;
      --text: #172033;
      --muted: #5f6b7a;
      --line: #d8dee8;
      --accent: #2563eb;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, .08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 13px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    button, a.button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }
    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e8edf5; color: var(--text); }
    .danger { background: #fee2e2; color: #991b1b; }
    .status {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .warning {
      border-color: #f7c873;
      background: #fff8eb;
      color: var(--warn);
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      main { padding: 18px; }
      .actions { flex-direction: column; }
      button, a.button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Vista Development Environment</h1>
    <p>This local-only setup stores staging Supabase credentials in this browser. This isolated clone is wired to its own primary Supabase project.</p>

    <div class="row">
      <div>
        <label for="env">Local database target</label>
        <select id="env">
          <option value="live">Live</option>
          <option value="staging">Staging</option>
        </select>
      </div>
      <div>
        <label for="url">Staging Supabase URL</label>
        <input id="url" placeholder="https://your-staging-ref.supabase.co" />
      </div>
    </div>

    <label for="key">Staging anon key</label>
    <input id="key" placeholder="Paste the staging anon key" />

    <div class="actions">
      <button class="primary" id="save" type="button">Save Local Settings</button>
      <button class="secondary" id="use-live" type="button">Use Primary Locally</button>
      <button class="danger" id="clear" type="button">Clear Staging Settings</button>
      <a class="button secondary" href="login.html">Open App</a>
    </div>

    <div class="status" id="status"></div>
  </main>

  <script>
    const keys = {
      env: 'vista_supabase_env',
      stagingUrl: 'vista_supabase_staging_url',
      stagingAnonKey: 'vista_supabase_staging_anon_key',
    }
    const liveUrl = 'https://knawjdrsdqgyfzqzddix.supabase.co'
    const isLocal = ['localhost', '127.0.0.1', '::1', ''].includes(window.location.hostname)

    function el(id) { return document.getElementById(id) }

    function applyQuerySettings() {
      if (!isLocal) return
      const params = new URLSearchParams(window.location.search)
      const requestedEnv = params.get('vista_env')
      const stagingUrl = params.get('staging_url')
      const stagingAnonKey = params.get('staging_key')
      if (requestedEnv === 'live' || requestedEnv === 'staging') localStorage.setItem(keys.env, requestedEnv)
      if (stagingUrl) localStorage.setItem(keys.stagingUrl, stagingUrl)
      if (stagingAnonKey) localStorage.setItem(keys.stagingAnonKey, stagingAnonKey)
      if (requestedEnv || stagingUrl || stagingAnonKey) {
        history.replaceState(null, '', window.location.pathname)
      }
    }

    function render() {
      const env = localStorage.getItem(keys.env) || 'live'
      const url = localStorage.getItem(keys.stagingUrl) || ''
      const key = localStorage.getItem(keys.stagingAnonKey) || ''
      el('env').value = env
      el('url').value = url
      el('key').value = key
      el('status').className = `status${env === 'staging' ? ' warning' : ''}`
      el('status').innerHTML = [
        `<strong>Current local target:</strong> ${env}`,
        `<strong>Live project:</strong> ${liveUrl}`,
        `<strong>Staging project:</strong> ${url || 'not set'}`,
        `<strong>Host guard:</strong> ${isLocal ? 'local host, switching allowed' : 'not local, live is forced'}`,
      ].join('<br>')
    }

    el('save').addEventListener('click', () => {
      const env = el('env').value
      const url = el('url').value.trim()
      const key = el('key').value.trim()
      if (env === 'staging' && (!url || !key)) {
        alert('Staging URL and anon key are required before switching to staging.')
        return
      }
      localStorage.setItem(keys.env, env)
      if (url) localStorage.setItem(keys.stagingUrl, url)
      if (key) localStorage.setItem(keys.stagingAnonKey, key)
      render()
    })

    el('use-live').addEventListener('click', () => {
      localStorage.setItem(keys.env, 'live')
      render()
    })

    el('clear').addEventListener('click', () => {
      localStorage.removeItem(keys.env)
      localStorage.removeItem(keys.stagingUrl)
      localStorage.removeItem(keys.stagingAnonKey)
      render()
    })

    applyQuerySettings()
    render()
  </script>
</body>
</html>
