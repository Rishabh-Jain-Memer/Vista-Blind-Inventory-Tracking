<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Vista Blind Tracking</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Login page: app-level username/password sign-in logic lives in js/login.js. -->
  <div class="login-page">
    <div class="login-wrap">
      <div class="login-head">
        <div class="login-icon"><i class="fa-solid fa-blinds"></i></div>
        <h1>Vista Blind Tracking</h1>
        <p>Sign in to your account</p>
      </div>
      <div class="login-card">
        <div id="login-alert" class="alert alert-error"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="username" autocomplete="username" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" id="login-btn">
            Sign in
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js?v=20260629-testmode-1"></script>
  <script src="js/auth.js?v=20260629-testmode-1"></script>
  <script src="js/utils.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
