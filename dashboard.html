<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Vista Manufacturing</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Dashboard page: shell/sidebar plus summary cards loaded by js/dashboard.js. -->
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="loading-center" id="loading"><div class="spinner spinner-lg"></div></div>
    <div id="content" class="d-none">
      <div class="page-header">
        <div><h1 id="greeting">Dashboard</h1><p>Here's what's happening with your inventory</p></div>
      </div>

      <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));">
        <div class="stat-card">
          <div><div class="stat-label">Orders This Month</div><div class="stat-value" id="s-orders">—</div></div>
          <div class="stat-icon icon-green"><i class="fa-solid fa-cart-shopping"></i></div>
        </div>
        <div class="stat-card">
          <div><div class="stat-label">Revenue (Executed)</div><div class="stat-value" id="s-revenue">—</div></div>
          <div class="stat-icon icon-violet"><i class="fa-solid fa-indian-rupee-sign"></i></div>
        </div>
        <div class="stat-card">
          <div><div class="stat-label">Cost (Executed)</div><div class="stat-value" id="s-cost">—</div></div>
          <div class="stat-icon icon-red"><i class="fa-solid fa-receipt"></i></div>
        </div>
        <div class="stat-card">
          <div><div class="stat-label">Net Profit</div><div class="stat-value" id="s-profit">—</div></div>
          <div class="stat-icon icon-green"><i class="fa-solid fa-chart-line"></i></div>
        </div>
        <div class="stat-card">
          <div>
            <div class="stat-label">Low Stock Alerts</div>
            <div class="stat-value" id="s-low">—</div>
            <div class="stat-sub">Rolls below 5 meters</div>
          </div>
          <div class="stat-icon icon-red" id="s-low-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        </div>
      </div>

      <div class="grid-2-1">
        <div class="card">
          <div class="card-header">
            <h2>Recent Orders</h2>
            <a href="orders.html">View all →</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Order ID</th><th>Customer</th><th>Date</th><th>Status</th><th class="tr">Total</th>
              </tr></thead>
              <tbody id="recent-orders"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2>Low Stock Rolls</h2></div>
          <div id="low-stock-list"><div class="empty-state">Loading…</div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/transitions.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
